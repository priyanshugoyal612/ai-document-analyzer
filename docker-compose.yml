version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: ai-document-analyzer-db
    environment:
      POSTGRES_DB: documentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - C:/GitHub/windsurf/AIDocumentAnalyzer/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
